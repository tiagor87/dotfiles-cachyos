# Tema do SDDM — copiado para /etc/sddm.conf.d/10-theme.conf pelo 3-sddm.sh.
# (Não é symlink: o greeter roda como root no boot, antes do $HOME montar.)
[Theme]
Current=sddm-astronaut-theme

[General]
# Teclado virtual usado pelo tema astronaut (dep qt6-virtualkeyboard).
InputMethod=qtvirtualkeyboard
