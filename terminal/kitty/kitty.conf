# kitty.conf — terminal kitty (animações de cursor + cores Material You via DMS)
#
# Linkado para ~/.config/kitty/kitty.conf pelo terminal/install/2-symlinks.sh.
# As cores são dinâmicas: o DMS gera ~/.config/kitty/dank-theme.conf e
# dank-tabs.conf (matugen, acompanham o wallpaper) e este arquivo os inclui no
# fim, sobrescrevendo o tema estático de fallback (theme.conf).

# ─── Fonte ──────────────────────────────────────────────────────────────────
font_family       JetBrainsMono Nerd Font
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         11.5
# Ligaduras só fora da célula sob o cursor (mantém legível ao editar).
disable_ligatures cursor
modify_font       cell_height 110%

# ─── Cursor: TODAS as animações ─────────────────────────────────────────────
cursor_shape              beam
cursor_beam_thickness     1.6
# Cursor "oco" quando a janela perde o foco.
cursor_shape_unfocused    hollow
# Piscada suave com easing (kitty >= 0.40).
cursor_blink_interval     0.5 ease-in-out
cursor_stop_blinking_after 15.0
# Rastro animado que segue o cursor ao mover (kitty >= 0.36).
cursor_trail              3
cursor_trail_decay        0.1 0.4
cursor_trail_start_threshold 2

# ─── Mouse ──────────────────────────────────────────────────────────────────
mouse_hide_wait           3.0
detect_urls               yes
copy_on_select            no

# ─── Rolagem ────────────────────────────────────────────────────────────────
scrollback_lines          20000
wheel_scroll_multiplier   5.0
touch_scroll_multiplier   2.0

# ─── Aparência da janela ────────────────────────────────────────────────────
window_padding_width      12
hide_window_decorations   yes
background_opacity         0.92
dynamic_background_opacity yes
confirm_os_window_close    0
# Animação de transição visual do "visual bell" no lugar do beep.
enable_audio_bell          no
visual_bell_duration       0.15 ease-in-out
window_resize_step_cells   2
window_resize_step_lines   2

# ─── Abas (estilo; cores vêm do dank-tabs.conf do DMS) ──────────────────────
tab_bar_edge              top
tab_bar_style             powerline
tab_powerline_style       slanted
tab_bar_min_tabs          2

# ─── Performance ────────────────────────────────────────────────────────────
repaint_delay             8
input_delay               2
sync_to_monitor           yes

# ─── Atalhos úteis ──────────────────────────────────────────────────────────
# Shift+Enter envia o Shift+Enter do protocolo de teclado do kitty (CSI u), que
# os TUIs/agentes (Claude Code, Herdr, nvim) interpretam como "nova linha".
map shift+enter           send_text all \x1b[13;2u
map ctrl+shift+enter      new_window
map ctrl+shift+t          new_tab
map ctrl+shift+l          next_layout
map ctrl+plus             change_font_size all +1.0
map ctrl+minus            change_font_size all -1.0
map ctrl+0                change_font_size all 0

# ─── Cores ──────────────────────────────────────────────────────────────────
# Caminhos relativos: o kitty resolve includes na pasta do config
# (~/.config/kitty/, via symlink), onde tanto o theme.conf quanto os
# dank-*.conf (gerados pelo DMS) residem. globinclude exige padrão relativo.
# 1) fallback estático bonito (Catppuccin Mocha)...
include     theme.conf
# 2) ...sobrescrito pelas cores dinâmicas do DMS quando presentes (Material You).
globinclude dank-*.conf
