# config.toml — Herdr (multiplexer de coding agents)
#
# Linkado para ~/.config/herdr/config.toml pelo terminal/install/3-symlinks.sh.
#
# Look & feel do kitty:
#  - Fonte: herdada automaticamente do kitty (o Herdr roda dentro dele).
#  - Cores: o tema "terminal" usa a paleta do próprio terminal hospedeiro, então
#    o Herdr acompanha as cores Material You que o DMS injeta no kitty
#    (dank-theme.conf) — muda junto com o wallpaper, sem config extra.
[theme]
name = "terminal"

# Alternativas:
#  - Para travar num tema estático (igual ao fallback do kitty), use:
#        name = "catppuccin"
#  - Para ajustar cores pontuais sobre o tema escolhido:
#        [theme.custom]
#        panel_bg = "reset"      # painel transparente (acompanha o opacity do kitty)
#        accent   = "#cba6f7"
