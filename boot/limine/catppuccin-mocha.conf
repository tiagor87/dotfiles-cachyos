# Paleta Catppuccin Mocha para o Limine — REFERÊNCIA.
#
# O CachyOS já aplica esta paleta (via diegons490/cachyos-limine-theme), com um
# wallpaper (boot():/limine-splash.png) e term_background transparente (ffffffff)
# pra ele aparecer. Mesmas cores do kitty/SDDM → boot → login → desktop coesos.
#
# O boot/install/1-limine-theme.sh garante ESTAS chaves de cor no
# /boot/limine.conf (idempotente, com backup). Ele NÃO mexe em term_background
# nem wallpaper (preserva o splash) nem nas entradas de kernel — as chaves de
# cor só existem na seção global, então o sed por chave é seguro.

term_palette: 1e1e2e;f38ba8;a6e3a1;f9e2af;89b4fa;f5c2e7;94e2d5;cdd6f4
term_palette_bright: 585b70;f38ba8;a6e3a1;f9e2af;89b4fa;f5c2e7;94e2d5;cdd6f4
term_foreground: cdd6f4
term_foreground_bright: cdd6f4
